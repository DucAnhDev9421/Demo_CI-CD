name: CI/CD Pipline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t ducanhdev9421/demo-cicd:latest .

      - name: Push image
        run: docker push ducanhdev9421/demo-cicd:latest

      - name: Deploy
        run: |
          REPO="ducanhdev9421/demo-cicd"
          CONTAINER_PORT=8080
          curl -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=2&container_port=$CONTAINER_PORT"